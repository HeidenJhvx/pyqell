# pyq001 — Elliott Wave Quant System Config
# EGP v4.0 | Bootstrap Mode

system:
  name: pyq001
  version: "1.0.0"
  mode: bootstrap        # bootstrap | operational
  egp_autonomy_level: 0  # 0: Chairman 승인 필요 / 2: Phase 내 자율

# ── 마켓 설정 ─────────────────────────────────────────────────
markets:
  default_exchange: binance
  symbols:
    - BTC/USDT
    - ETH/USDT
  timeframes:            # 멀티 타임프레임 (상위 → 하위 순서로 사용)
    - 1d
    - 4h
    - 1h
    - 15m
  primary_tf: 1h         # Wave 탐지 기본 타임프레임

# ── 데이터 설정 ───────────────────────────────────────────────
data:
  parquet_dir: src/data/parquet
  cache_days: 365        # 로컬 저장 기간
  min_candles: 500       # Wave 탐지에 필요한 최소 캔들 수

# ── Elliott Wave 설정 (Phase 2에서 확장) ─────────────────────
elliott:
  zigzag_threshold: 0.05  # ZigZag 감도 (5% 이상 swing만 인정)
  min_wave_length: 5       # 최소 파동 길이 (캔들 수)
  fibonacci_levels:
    retracement: [0.236, 0.382, 0.500, 0.618, 0.786]
    extension:   [1.000, 1.272, 1.414, 1.618, 2.000, 2.618]

# ── 리스크 설정 ───────────────────────────────────────────────
risk:
  max_risk_per_trade_pct: 1.0   # 거래당 최대 리스크 (자본 대비 %)
  max_leverage: 20
  default_leverage: 5
  max_drawdown_pct: 10.0        # EGP 임계점: 10% MDD 초과 시 중단

# ── 신호 설정 ─────────────────────────────────────────────────
signals:
  min_confidence: 0.6           # 최소 신호 신뢰도
  max_signal_failure_rate: 0.20 # EGP 임계점: 신호 실패율 20% 초과 시 알림

# ── API 설정 (secrets.yaml 또는 환경변수로 관리) ─────────────
exchange:
  binance:
    api_key: ${BINANCE_API_KEY}
    api_secret: ${BINANCE_API_SECRET}
    testnet: true                # Phase 4 전까지 testnet 사용

llm:
  anthropic_api_key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  max_tokens: 2048
